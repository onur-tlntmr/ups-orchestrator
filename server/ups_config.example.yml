# UPS Orchestrator - Device Configuration
#
# Copy this file to ups_config.yml and adjust for your setup.
# Each entry in ups_devices defines one UPS and (optionally) the desktop it protects.

ups_devices:

  # --- Server's own UPS (no desktop attached) ---
  - id: "server-ups"
    nut_name: "server-ups@localhost"
    local: true
    # No `desktop:` block → on ONBATT, server uses desktop_offline_wait then self-shuts down

    timing:
      desktop_offline_wait: 300       # 5 min on battery → self-shutdown

  # --- Desktop's UPS (USB on this server, but protected machine is the desktop) ---
  - id: "desktop-ups"
    nut_name: "desktop-ups@localhost"
    local: true

    timing:
      desktop_offline_wait: 300       # Desktop already off → wait 5 min then power off UPS
      desktop_online_prompt_wait: 180 # Desktop online → notify user, give 180 s
      desktop_suspend_wait: 600       # Desktop suspended → wait 10 min before waking
      desktop_shutdown_wait: 60       # After issuing shutdown, wait 60 s for confirmation
      wake_online_timeout: 60         # After WoL, wait up to 60 s for desktop to come online

    desktop:
      agent_url: "http://192.168.50.2:8788"
      mac_address: "AA:BB:CC:DD:EE:FF"  # Required for the suspend → wake flow

  # --- Remote UPS example (managed via SSH) ---
