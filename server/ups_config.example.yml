# UPS Orchestrator - Device Configuration
#
# Copy this file to ups_config.yml and adjust for your setup.
# Each entry defines a UPS physically attached to THIS server and (optionally)
# the desktop machine it should coordinate with over HTTP.
#
# Note: the orchestrator only manages UPS devices attached locally. For a
# desktop with its own UPS, run NUT directly on the desktop (see README —
# NUT master/slave setup). The desktop will shut down autonomously via its
# own upsmon, and will also shut down as a slave of this server's UPS.

ups_devices:

  - id: "server-ups"
    nut_name: "server-ups@localhost"

    timing:
      desktop_offline_wait: 300       # Desktop off / no desktop → wait 5 min then fsd
      desktop_online_prompt_wait: 180 # Desktop online → prompt user, give 180 s
      desktop_suspend_wait: 600       # Desktop suspended → wait 10 min before waking
      desktop_shutdown_wait: 60       # After issuing shutdown, wait 60 s for confirmation
      wake_online_timeout: 60         # After WoL, wait up to 60 s for desktop to come online

    # Optional: send WoL via SSH on a relay host (e.g. Proxmox host) instead of locally.
    # Useful when the server runs inside a VM and the bridge blocks broadcast frames.
    # wol_relay:
    #   host: "root@192.168.50.1"
    #   identity_file: "/root/.ssh/wol_key"  # omit to use the default SSH key

    desktop:
      agent_url: "http://192.168.50.2:8788"
      mac_address: "AA:BB:CC:DD:EE:FF"  # Required for the suspend → wake flow
